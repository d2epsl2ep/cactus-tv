<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080808" />
  <meta name="description" content="Cactus TV" />
  <title>Cactus TV</title>
  <link rel="icon" href="/assets/cactus.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css?v=0.2.8-tablet" />
</head>
<body>
  <header class="topbar" id="topbar">
    <a class="brand" href="/" aria-label="Cactus TV 首页">
      <span class="brand-word" id="brandName">CACTUS</span><span class="brand-tv">TV</span>
    </a>

    <nav class="nav-tabs" aria-label="页面导航">
      <button class="nav-tab active" data-view="home" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 10.5 12 3.7l8.5 6.8v9.2h-5.3v-6H8.8v6H3.5v-9.2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span>首页</span>
      </button>
      <button class="nav-tab" data-view="favorites" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.2 4.4 13A5.3 5.3 0 0 1 12 5.8 5.3 5.3 0 0 1 19.6 13L12 20.2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span>我的片单</span>
      </button>
      <button class="nav-tab" data-view="history" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.2 8.3A8.5 8.5 0 1 1 3.6 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 3.8v5h5M12 7.4V12l3.1 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>继续观看</span>
      </button>
    </nav>

    <div class="top-actions">
      <button id="searchToggle" class="icon-button" type="button" aria-label="搜索" title="搜索">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.7" cy="10.7" r="6.8" fill="none" stroke="currentColor" stroke-width="2"/><path d="m15.8 15.8 4.5 4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button id="settingsButton" class="icon-button" type="button" aria-label="播放设置" title="播放设置">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm9 3.5-2.1-1.2.1-1.2-1.7-2.9-1.2.5-1-.7-.1-1.3h-3.4l-.1 1.3-1 .7-1.2-.5-1.7 2.9.1 1.2L3 12l2.1 1.2-.1 1.2 1.7 2.9 1.2-.5 1 .7.1 1.3h3.4l.1-1.3 1-.7 1.2.5 1.7-2.9-.1-1.2L21 12Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <form id="searchForm" class="top-search" role="search">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.7" cy="10.7" r="6.8" fill="none" stroke="currentColor" stroke-width="2"/><path d="m15.8 15.8 4.5 4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="search" autocomplete="off" placeholder="搜索电影、剧集或关键词" aria-label="搜索影视" />
      <button class="search-submit" type="submit">搜索</button>
      <button class="search-close" id="searchClose" type="button" aria-label="关闭搜索">×</button>
    </form>
  </header>

  <main>
    <section class="hero" id="hero">
      <div class="hero-backdrop" id="heroBackdrop"></div>
      <div class="hero-artwork" id="heroArtworkWrap"><img id="heroArtwork" alt="" referrerpolicy="no-referrer" /></div>
      <div class="hero-vignette"></div>
      <div class="hero-content">
        <div class="hero-copy">
          <h1 id="heroTitle">今晚看什么？</h1>
          <div class="hero-meta" id="heroMeta"></div>
          <p id="heroOverview"></p>
          <div class="hero-actions">
            <button id="heroPlayButton" class="hero-button hero-button-primary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 5 11 7-11 7V5Z" fill="currentColor"/></svg>
              查找片源
            </button>
            <button id="heroInfoButton" class="hero-button hero-button-secondary" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 10.5V17M12 7.3v.2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              浏览片单
            </button>
          </div>
        </div>
        <div id="sourcePills" class="source-pills" hidden></div>
      </div>
    </section>

    <div id="notice" class="notice hidden"></div>

    <section id="homeSections" class="home-sections"></section>

    <section id="resultsSection" class="content-section hidden">
      <div class="section-heading results-heading">
        <h2 id="sectionTitle">搜索结果</h2>
        <span id="resultCount" class="muted"></span>
        <span id="sectionKicker" class="hidden"></span>
      </div>
      <div id="skeletons" class="media-grid hidden" aria-hidden="true"></div>
      <div id="mediaGrid" class="media-grid"></div>
      <div id="emptyState" class="empty-state hidden"><div class="empty-icon">C</div><h3>暂无内容</h3><p>换个片名再试试。</p></div>
    </section>
  </main>

  <dialog id="detailDialog" class="sheet">
    <button class="sheet-close" data-close="detailDialog" aria-label="关闭">×</button>
    <div id="detailContent"></div>
  </dialog>

  <dialog id="playerDialog" class="player-dialog">
    <div class="player-head"><div><strong id="playerTitle">正在播放</strong><span id="playerSubtitle"></span></div><button class="sheet-close" data-close="playerDialog" aria-label="关闭">×</button></div>
    <div class="video-shell"><video id="videoPlayer" controls playsinline preload="metadata"></video><div id="playerMessage" class="player-message hidden"></div></div>
    <div class="player-tools">
      <label>字幕<select id="subtitleSelect"><option value="">关闭</option></select></label>
      <label class="file-button">加载本地字幕<input id="subtitleFile" type="file" accept=".vtt,.srt,text/vtt,application/x-subrip" /></label>
      <span id="resumeHint" class="muted"></span>
    </div>
  </dialog>

  <dialog id="settingsDialog" class="settings-dialog">
    <button class="sheet-close" data-close="settingsDialog" aria-label="关闭">×</button>
    <div class="settings-copy"><h2>播放设置</h2>
      <label class="setting-row"><span><strong>记录观看历史</strong><small>保存在当前浏览器</small></span><input id="historyToggle" type="checkbox" checked /></label>
      <label class="setting-row"><span><strong>优先使用原生 HLS</strong><small>设备支持时直接播放</small></span><input id="nativeHlsToggle" type="checkbox" checked /></label>
      <label class="setting-row"><span><strong>恢复播放进度</strong><small>从上次停止的位置继续</small></span><input id="resumeToggle" type="checkbox" checked /></label>
    </div>
  </dialog>

  <div id="toast" class="toast hidden" role="status"></div>

  <footer><span id="footerName">Cactus TV</span><span id="metadataCredit"></span></footer>
  <script type="module" src="/js/app.js?v=0.2.8.2-image-cache"></script>
</body>
</html>
